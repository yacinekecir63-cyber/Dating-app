<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Chelsea+Market&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Date app</title>
</head>
<body>
    <audio src="loveSong.mp3" id="song" loop></audio>
    <h1 id="asking">Would you go on a date with me 💘 ?</h1>
    <div class="container" id="container">
        <h1>Choose carefully 💗</h1>
        <div class="yesNoContainer">
            <button id="yes">Yes 💖</button>
            <button id="no">No ❌</button>
        </div>
    </div>
    <h1 id="foodTittle">Greatt ...! Pick your fav food then !</h1>
    <div class="foodContainer" id="foodContainer">
        <div class="foods" id="pizza">Pizza 🍕</div>
        <div class="foods" id="sushi">Sushi 🍥</div>
        <div class="foods" id="pasta">Pasta 🍝</div>
        <div class="foods" id="sweets">Sweets🍰</div>
    </div>
    <h1 id="timeAsking">When are you free ?</h1>
    <div id="timeContainer" class="timeContainer">
        <label for="time">Pick a time : </label>
        <input id="time" type="time" placeholder="00:00"><br>
        <label for="date">Pick a day : </label>
        <input id="date" type="date" >
    </div>
    <button id="confirm">Confirm 💞</button>
    <h1 id="lasth1"></h1>
    <h1 id="seeyou">See Youu there !</h1>
    <img src="loveGif.gif" id="loveImg" alt="loveImg">

    <script src="script.js"></script>
</body>
</html>
